<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>원소 합성</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #1b1d21;
      --panel-2: #24272d;
      --line: #343842;
      --text: #f3f5f7;
      --muted: #aab0bb;
      --accent: #40c9a2;
      --danger: #ff6b6b;
      --gold: #ffc857;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .app {
      width: min(1120px, 100vw);
      height: min(760px, 100vh);
      display: grid;
      grid-template-columns: minmax(320px, 520px) 300px;
      gap: 18px;
      padding: 18px;
    }

    .stage-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #17191d 0%, #111215 100%);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 12px;
    }

    .title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 2px;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
    }
