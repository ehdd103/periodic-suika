<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>원소 합성</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #1b1d21;
      --panel-2: #24272d;
      --line: #343842;
      --text: #f3f5f7;
      --muted: #aab0bb;
      --accent: #40c9a2;
      --danger: #ff6b6b;
      --gold: #ffc857;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .app {
      width: min(1120px, 100vw);
      height: min(760px, 100vh);
      display: grid;
      grid-template-columns: minmax(320px, 520px) 300px;
      gap: 18px;
      padding: 18px;
    }

    .stage-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #17191d 0%, #111215 100%);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 12px;
    }

    .title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 2px;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      min-height: 74px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      padding: 10px;
    }

    .label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .value {
      font-size: 25px;
      line-height: 1;
      font-weight: 780;
    }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .preview {
      display: grid;
      grid-template-columns: 62px 1fr;
      align-items: center;
      gap: 10px;
      min-height: 86px;
    }

    .atom-preview {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, .35);
      box-shadow: inset 0 -10px 18px rgba(0, 0, 0, .22), 0 8px 22px rgba(0, 0, 0, .2);
      color: #111;
      font-weight: 850;
    }

    .atom-meta {
      min-width: 0;
    }

    .symbol {
      font-size: 22px;
      line-height: 1;
      font-weight: 800;
    }

    .name {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #2c3038;
      color: var(--text);
      min-height: 40px;
      padding: 0 12px;
      font: inherit;
      font-weight: 720;
      cursor: pointer;
    }

    button:hover {
      border-color: #555d6e;
      background: #363b45;
    }

    button.primary {
      border-color: rgba(64, 201, 162, .55);
      background: #1f4b42;
    }

    .rules {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .chain {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 6px;
      padding-right: 2px;
    }

    .chain-item {
      display: grid;
      grid-template-columns: 34px 42px 1fr;
      align-items: center;
      min-height: 34px;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .chain-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #111;
      font-size: 11px;
      font-weight: 850;
      border: 1px solid rgba(255, 255, 255, .36);
    }

    .chain-symbol {
      color: var(--text);
      font-weight: 800;
      font-size: 15px;
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 76px;
      transform: translateX(-50%);
      pointer-events: none;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(25, 28, 33, .9);
      text-align: center;
      font-weight: 750;
      opacity: 0;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 5;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -8px);
    }

    .game-over {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(12, 13, 15, .78);
      z-index: 10;
      padding: 22px;
    }

    .game-over.show {
      display: grid;
    }

    .modal {
      width: min(340px, 100%);
      border: 1px solid var(--line);
      background: #1b1d21;
      padding: 20px;
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .modal p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .aim {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, .18);
      pointer-events: none;
      z-index: 3;
    }

    .danger-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 78px;
      height: 2px;
      background: repeating-linear-gradient(90deg, rgba(255, 107, 107, .85) 0 14px, transparent 14px 24px);
      pointer-events: none;
      z-index: 2;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .app {
        width: 100vw;
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 10px;
      }

      .stage-wrap {
        height: min(72vh, 650px);
        min-height: 430px;
      }

      .hud {
        min-height: auto;
      }

      .preview-row,
      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .chain {
        max-height: 220px;
      }
    }

    @media (max-width: 430px) {
      .preview-row,
      .stats {
        grid-template-columns: 1fr;
      }

      .title {
        display: block;
      }

      .subtitle {
        margin-top: 5px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage-wrap" id="stageWrap" aria-label="원소 합성 게임판">
      <div class="danger-line"></div>
      <div class="aim" id="aim"></div>
      <div class="toast" id="toast"></div>
      <div class="game-over" id="gameOver">
        <div class="modal">
          <h2>게임 오버</h2>
          <p id="finalText">점수 0</p>
          <button class="primary" id="restartModal">다시 시작</button>
        </div>
      </div>
    </section>

    <aside class="hud">
      <div class="title">
        <h1>원소 합성</h1>
        <div class="subtitle">Atomic Suika</div>
      </div>

      <section class="stats">
        <div class="stat">
          <div class="label">점수</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">최고점</div>
          <div class="value" id="bestScore">0</div>
        </div>
        <div class="stat">
          <div class="label">최고 원소</div>
          <div class="value" id="bestElement">H</div>
        </div>
        <div class="stat">
          <div class="label">합성 수</div>
          <div class="value" id="mergeCount">0</div>
        </div>
      </section>

      <section class="panel preview-row">
        <div>
          <div class="label">현재</div>
          <div class="preview">
            <div class="atom-preview" id="currentBall">H</div>
            <div class="atom-meta">
              <div class="symbol" id="currentSymbol">H</div>
              <div class="name" id="currentName">수소</div>
            </div>
          </div>
        </div>
        <div>
          <div class="label">다음</div>
          <div class="preview">
            <div class="atom-preview" id="nextBall">He</div>
            <div class="atom-meta">
              <div class="symbol" id="nextSymbol">He</div>
              <div class="name" id="nextName">헬륨</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="controls">
          <button class="primary" id="dropButton">떨어뜨리기</button>
          <button id="restartButton">초기화</button>
        </div>
      </section>

      <section class="panel rules">
        <div>같은 원소끼리 닿으면 다음 원자번호 원소로 합쳐집니다.</div>
        <div>마우스 이동 또는 터치로 위치를 정하고 클릭해서 떨어뜨리세요.</div>
      </section>

      <section class="panel chain" id="chain" aria-label="원소 합성 순서"></section>
    </aside>
  </main>

  <script>
    const elements = [
      { z: 1, symbol: "H", name: "수소", group: "nonmetal", color: "#8bd3dd" },
      { z: 2, symbol: "He", name: "헬륨", group: "noble", color: "#b8f2e6" },
      { z: 3, symbol: "Li", name: "리튬", group: "alkali", color: "#ffcad4" },
      { z: 4, symbol: "Be", name: "베릴륨", group: "alkaline", color: "#caffbf" },
      { z: 5, symbol: "B", name: "붕소", group: "metalloid", color: "#ffd6a5" },
      { z: 6, symbol: "C", name: "탄소", group: "nonmetal", color: "#9bf6ff" },
      { z: 7, symbol: "N", name: "질소", group: "nonmetal", color: "#a0c4ff" },
      { z: 8, symbol: "O", name: "산소", group: "nonmetal", color: "#fdffb6" },
      { z: 9, symbol: "F", name: "플루오린", group: "halogen", color: "#ffc6ff" },
      { z: 10, symbol: "Ne", name: "네온", group: "noble", color: "#bdb2ff" },
      { z: 11, symbol: "Na", name: "나트륨", group: "alkali", color: "#ffadad" },
      { z: 12, symbol: "Mg", name: "마그네슘", group: "alkaline", color: "#d0f4de" },
      { z: 13, symbol: "Al", name: "알루미늄", group: "post", color: "#f1c0e8" },
      { z: 14, symbol: "Si", name: "규소", group: "metalloid", color: "#cfbaf0" },
      { z: 15, symbol: "P", name: "인", group: "nonmetal", color: "#a3c4f3" },
      { z: 16, symbol: "S", name: "황", group: "nonmetal", color: "#fde68a" },
      { z: 17, symbol: "Cl", name: "염소", group: "halogen", color: "#86efac" },
      { z: 18, symbol: "Ar", name: "아르곤", group: "noble", color: "#93c5fd" },
      { z: 19, symbol: "K", name: "칼륨", group: "alkali", color: "#fca5a5" },
      { z: 20, symbol: "Ca", name: "칼슘", group: "alkaline", color: "#bef264" },
      { z: 21, symbol: "Sc", name: "스칸듐", group: "transition", color: "#f9a8d4" },
      { z: 22, symbol: "Ti", name: "타이타늄", group: "transition", color: "#c4b5fd" },
      { z: 23, symbol: "V", name: "바나듐", group: "transition", color: "#67e8f9" },
      { z: 24, symbol: "Cr", name: "크로뮴", group: "transition", color: "#fcd34d" }
    ];

    const MatterAliases = Matter;
    const { Engine, Render, Runner, Bodies, Body, Composite, Events, Vector } = MatterAliases;

    const stageWrap = document.getElementById("stageWrap");
    const aim = document.getElementById("aim");
    const toast = document.getElementById("toast");
    const gameOver = document.getElementById("gameOver");
    const finalText = document.getElementById("finalText");
    const scoreEl = document.getElementById("score");
    const bestScoreEl = document.getElementById("bestScore");
    const bestElementEl = document.getElementById("bestElement");
    const mergeCountEl = document.getElementById("mergeCount");
    const dropButton = document.getElementById("dropButton");
    const restartButton = document.getElementById("restartButton");
    const restartModal = document.getElementById("restartModal");

    const currentBall = document.getElementById("currentBall");
    const currentSymbol = document.getElementById("currentSymbol");
    const currentName = document.getElementById("currentName");
    const nextBall = document.getElementById("nextBall");
    const nextSymbol = document.getElementById("nextSymbol");
    const nextName = document.getElementById("nextName");
    const chainEl = document.getElementById("chain");

    const saveKey = "periodic-suika-state-v1";
    let width = 0;
    let height = 0;
    let engine;
    let render;
    let runner;
    let walls = [];
    let score = 0;
    let bestScore = 0;
    let bestIndex = 0;
    let mergeCount = 0;
    let currentIndex = 0;
    let nextIndex = 1;
    let aimX = 0;
    let canDrop = true;
    let ended = false;
    let toastTimer = null;
    let mergeLock = new Set();

    function radiusFor(index) {
      return 17 + index * 2.4;
    }

    function randomSpawnIndex() {
      const max = Math.min(4, Math.max(1, bestIndex + 1));
      const weights = [38, 30, 18, 10, 4];
      const pool = [];
      for (let i = 0; i <= max; i += 1) {
        for (let j = 0; j < weights[i]; j += 1) pool.push(i);
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function loadSave() {
      try {
        const saved = JSON.parse(localStorage.getItem(saveKey) || "{}");
        bestScore = Number(saved.bestScore || 0);
      } catch {
        bestScore = 0;
      }
    }

    function saveBest() {
      localStorage.setItem(saveKey, JSON.stringify({ bestScore }));
    }

    function updatePanel() {
      const cur = elements[currentIndex];
      const nxt = elements[nextIndex];
      scoreEl.textContent = score.toLocaleString("ko-KR");
      bestScoreEl.textContent = bestScore.toLocaleString("ko-KR");
      bestElementEl.textContent = elements[bestIndex].symbol;
      mergeCountEl.textContent = mergeCount.toLocaleString("ko-KR");
      setPreview(currentBall, currentSymbol, currentName, cur);
      setPreview(nextBall, nextSymbol, nextName, nxt);
    }

    function setPreview(ball, symbolEl, nameEl, element) {
      ball.textContent = element.symbol;
      ball.style.background = element.color;
      symbolEl.textContent = element.symbol;
      nameEl.textContent = `${element.z}. ${element.name}`;
    }

    function buildChain() {
      chainEl.innerHTML = "";
      elements.forEach((element) => {
        const row = document.createElement("div");
        row.className = "chain-item";
        row.innerHTML = `
          <div class="chain-dot" style="background:${element.color}">${element.symbol}</div>
          <div class="chain-symbol">${element.symbol}</div>
          <div>${element.z}. ${element.name}</div>
        `;
        chainEl.appendChild(row);
      });
    }

    function stageSize() {
      const rect = stageWrap.getBoundingClientRect();
      width = Math.max(320, Math.floor(rect.width));
      height = Math.max(430, Math.floor(rect.height));
      aimX = Math.min(Math.max(aimX || width / 2, 36), width - 36);
      aim.style.left = `${aimX}px`;
    }

    function createWorld() {
      stageSize();
      engine = Engine.create();
      engine.gravity.y = 0.95;

      render = Render.create({
        element: stageWrap,
        engine,
        options: {
          width,
          height,
          wireframes: false,
          background: "transparent",
          pixelRatio: Math.min(window.devicePixelRatio || 1, 2)
        }
      });

      runner = Runner.create();
      addWalls();
      Render.run(render);
      Runner.run(runner, engine);
      Events.on(engine, "collisionStart", handleCollisions);
      Events.on(render, "afterRender", drawLabels);
      Events.on(engine, "afterUpdate", checkGameOver);
    }

    function addWalls() {
      walls.forEach((wall) => Composite.remove(engine.world, wall));
      const t = 56;
      walls = [
        Bodies.rectangle(width / 2, height + t / 2 - 4, width + t * 2, t, { isStatic: true, label: "wall", render: { fillStyle: "#252830" } }),
        Bodies.rectangle(-t / 2 + 4, height / 2, t, height * 2, { isStatic: true, label: "wall", render: { fillStyle: "#252830" } }),
        Bodies.rectangle(width + t / 2 - 4, height / 2, t, height * 2, { isStatic: true, label: "wall", render: { fillStyle: "#252830" } })
      ];
      Composite.add(engine.world, walls);
    }

    function createAtom(index, x, y) {
      const element = elements[index];
      const radius = radiusFor(index);
      const atom = Bodies.circle(x, y, radius, {
        restitution: 0.18,
        friction: 0.06,
        frictionAir: 0.003,
        density: 0.0015 + index * 0.00009,
        label: "atom",
        render: {
          fillStyle: element.color,
          strokeStyle: "rgba(255,255,255,.42)",
          lineWidth: 2
        }
      });
      atom.plugin = { elementIndex: index, merging: false, bornAt: Date.now() };
      return atom;
    }

    function dropAtom() {
      if (!canDrop || ended) return;
      canDrop = false;
      const radius = radiusFor(currentIndex);
      const x = Math.min(Math.max(aimX, radius + 10), width - radius - 10);
      const atom = createAtom(currentIndex, x, 34);
      Composite.add(engine.world, atom);
      currentIndex = nextIndex;
      nextIndex = randomSpawnIndex();
      updatePanel();
      setTimeout(() => {
        canDrop = true;
      }, 520);
    }

    function handleCollisions(event) {
      for (const pair of event.pairs) {
        const a = pair.bodyA;
        const b = pair.bodyB;
        if (a.label !== "atom" || b.label !== "atom") continue;
        const ai = a.plugin.elementIndex;
        const bi = b.plugin.elementIndex;
        if (ai !== bi || ai >= elements.length - 1) continue;
        if (a.plugin.merging || b.plugin.merging || mergeLock.has(a.id) || mergeLock.has(b.id)) continue;
        mergeAtoms(a, b, ai + 1);
      }
    }

    function mergeAtoms(a, b, next) {
      mergeLock.add(a.id);
      mergeLock.add(b.id);
      a.plugin.merging = true;
      b.plugin.merging = true;
      const midpoint = Vector.mult(Vector.add(a.position, b.position), 0.5);
      const velocity = Vector.mult(Vector.add(a.velocity, b.velocity), 0.45);
      Composite.remove(engine.world, a);
      Composite.remove(engine.world, b);
      const merged = createAtom(next, midpoint.x, midpoint.y);
      Body.setVelocity(merged, velocity);
      Body.setAngularVelocity(merged, (a.angularVelocity + b.angularVelocity) * 0.3);
      Composite.add(engine.world, merged);
      score += elements[next].z * 12;
      mergeCount += 1;
      if (next > bestIndex) {
        bestIndex = next;
        showToast(`${elements[next].symbol} 생성`);
      }
      if (score > bestScore) {
        bestScore = score;
        saveBest();
      }
      updatePanel();
      setTimeout(() => {
        mergeLock.delete(a.id);
        mergeLock.delete(b.id);
      }, 300);
    }

    function drawLabels() {
      const ctx = render.context;
      const bodies = Composite.allBodies(engine.world);
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const body of bodies) {
        if (body.label !== "atom") continue;
        const index = body.plugin.elementIndex;
        const element = elements[index];
        const radius = radiusFor(index);
        ctx.fillStyle = "#111318";
        ctx.font = `800 ${Math.max(13, Math.min(24, radius * 0.72))}px system-ui, sans-serif`;
        ctx.fillText(element.symbol, body.position.x, body.position.y - 2);
        if (radius >= 27) {
          ctx.font = `700 ${Math.max(9, Math.min(12, radius * 0.34))}px system-ui, sans-serif`;
          ctx.fillText(String(element.z), body.position.x, body.position.y + radius * 0.34);
        }
      }
      ctx.restore();
    }

    function checkGameOver() {
      if (ended) return;
      const now = Date.now();
      const bodies = Composite.allBodies(engine.world);
      for (const body of bodies) {
        if (body.label !== "atom") continue;
        if (now - body.plugin.bornAt < 2500) continue;
        if (body.position.y - radiusFor(body.plugin.elementIndex) < 78 && Math.abs(body.velocity.y) < 0.35) {
          endGame();
          return;
        }
      }
    }

    function endGame() {
      ended = true;
      canDrop = false;
      finalText.textContent = `점수 ${score.toLocaleString("ko-KR")} · 최고 원소 ${elements[bestIndex].symbol}`;
      gameOver.classList.add("show");
    }

    function showToast(text) {
      clearTimeout(toastTimer);
      toast.textContent = text;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1000);
    }

    function resetGame() {
      const atoms = Composite.allBodies(engine.world).filter((body) => body.label === "atom");
      atoms.forEach((atom) => Composite.remove(engine.world, atom));
      score = 0;
      bestIndex = 0;
      mergeCount = 0;
      currentIndex = randomSpawnIndex();
      nextIndex = randomSpawnIndex();
      canDrop = true;
      ended = false;
      gameOver.classList.remove("show");
      updatePanel();
    }

    function moveAim(clientX) {
      const rect = stageWrap.getBoundingClientRect();
      aimX = Math.min(Math.max(clientX - rect.left, 34), width - 34);
      aim.style.left = `${aimX}px`;
    }

    function resizeGame() {
      if (!render) return;
      stageSize();
      render.canvas.width = width * render.options.pixelRatio;
      render.canvas.height = height * render.options.pixelRatio;
      render.canvas.style.width = `${width}px`;
      render.canvas.style.height = `${height}px`;
      render.options.width = width;
      render.options.height = height;
      addWalls();
    }

    stageWrap.addEventListener("pointermove", (event) => moveAim(event.clientX));
    stageWrap.addEventListener("pointerdown", (event) => {
      moveAim(event.clientX);
      dropAtom();
    });
    dropButton.addEventListener("click", dropAtom);
    restartButton.addEventListener("click", resetGame);
    restartModal.addEventListener("click", resetGame);
    window.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        event.preventDefault();
        dropAtom();
      }
      if (event.code === "ArrowLeft") {
        aimX = Math.max(34, aimX - 22);
        aim.style.left = `${aimX}px`;
      }
      if (event.code === "ArrowRight") {
        aimX = Math.min(width - 34, aimX + 22);
        aim.style.left = `${aimX}px`;
      }
    });
    window.addEventListener("resize", resizeGame);

    loadSave();
    buildChain();
    currentIndex = randomSpawnIndex();
    nextIndex = randomSpawnIndex();
    createWorld();
    updatePanel();
  </script>
</body>
</html>
